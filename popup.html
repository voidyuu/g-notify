<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>G Notify</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>G Notify</h1>
          <p id="statusText">Checking status...</p>
        </div>
        <button id="statusDot" type="button" class="dot" aria-label="Toggle plugin status" title="Toggle plugin status"></button>
      </header>

      <section class="actions">
        <button id="connectButton" type="button">Connect Google</button>
        <button id="pollButton" type="button" class="secondary">Poll now</button>
        <button id="signOutButton" type="button" class="ghost">Sign out</button>
      </section>

      <section class="summary">
        <p id="summaryText">No sync yet.</p>
        <p id="summaryNote" class="summaryNote"></p>
      </section>

      <form id="settingsForm" class="settings">
        <section id="oauthFields" class="oauthFields">
          <label>
            OAuth client ID
            <input id="oauthClientIdInput" type="text" spellcheck="false" autocomplete="off" placeholder="000000000000-xxxx.apps.googleusercontent.com">
          </label>

          <label>
            Client secret
            <input id="oauthClientSecretInput" type="password" spellcheck="false" autocomplete="off" placeholder="GOCSPX-xxxxxxxx">
          </label>
          <a class="helpLink" href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noreferrer">
            Open Google Cloud credentials
          </a>

          <label>
            Redirect URI
            <input id="redirectUriInput" type="text" readonly>
          </label>
        </section>

        <label>
          Poll interval (minutes)
          <input id="pollIntervalInput" type="number" min="0.5" step="0.5">
        </label>

        <label>
          Gmail query
          <input id="gmailQueryInput" type="text" spellcheck="false">
        </label>
      </form>
    </main>

    <script src="src/popup.js"></script>
  </body>
</html>
